<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martina Slot Machine</title>
    <style>
        :root {
            --divider-pos: 50%;
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #ff3b30;
            --spin-speed: 3s; 
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        #app {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .screen {
            height: 100%;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #screen-left { width: var(--divider-pos); border-right: 1px solid #333; }
        #screen-right { flex-grow: 1; }

        #divider {
            position: absolute;
            left: var(--divider-pos);
            top: 0;
            width: 20px;
            height: 100%;
            transform: translateX(-50%);
            cursor: col-resize;
            z-index: 100;
            display: flex;
            justify-content: center;
        }
        #divider::after {
            content: '';
            width: 2px;
            height: 100%;
            background: rgba(255,255,255,0.2);
        }

        .reel-container {
            width: 100%;
            height: 100%;
            overflow: hidden;
            transition: opacity 0.5s ease;
        }

        .reel-strip {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        .spinning .reel-strip {
            animation: scrollReel var(--spin-speed) linear infinite;
            filter: blur(8px);
        }

        .stopping .reel-strip {
            animation: none;
            transition: transform 2.5s cubic-bezier(0.15, 0, 0.15, 1);
            filter: blur(0);
        }

        @keyframes scrollReel {
            0% { transform: translateY(0); }
            100% { transform: translateY(-33.333%); }
        }

        .reel-item-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .reel-item {
            max-width: 80%;
            max-height: 60%;
            object-fit: contain;
        }

        .item-label {
            margin-top: 20px;
            color: var(--text-color);
            font-size: 1.2rem;
            text-transform: uppercase;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            pointer-events: none;
            text-align: center;
        }

        /* Result View Overlay */
        .result-display {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        .show-result .result-display {
            opacity: 1;
            visibility: visible;
        }

        .result-image {
            max-width: 80%;
            max-height: 60%;
            object-fit: contain;
        }

        .result-label {
            margin-top: 20px;
            color: var(--text-color);
            font-size: 1.2rem;
            text-transform: uppercase;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            text-align: center;
        }

        .show-result .reel-container { opacity: 0; }

        #message-overlay {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 50;
        }
        
        .show-result #message-overlay {
            opacity: 1;
        }

        .key-message {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-color);
            margin-bottom: 0.5rem;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .leporello-text {
            font-size: 1rem;
            color: rgba(255,255,255,0.8);
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body class="spinning">

<div id="app">
    <div id="screen-left" class="screen">
        <div class="reel-container" id="container-left">
            <div class="reel-strip" id="strip-left"></div>
        </div>
        <div class="result-display">
            <img id="display-portrait" class="result-image" alt="">
            <div id="label-portrait" class="result-label"></div>
        </div>
    </div>

    <div id="divider"></div>

    <div id="screen-right" class="screen">
        <div class="reel-container" id="container-right">
            <div class="reel-strip" id="strip-right"></div>
        </div>
        <div class="result-display">
            <img id="display-object" class="result-image" alt="">
            <div id="label-object" class="result-label"></div>
            
            <div id="message-overlay">
                <div id="key-message" class="key-message"></div>
                <div id="leporello" class="leporello-text"></div>
            </div>
        </div>
    </div>
</div>

<audio id="audio-player"></audio>

<script>
    const data = [
        {
            id: 15,
            name: "Yulia Virts",
            country: "Ukraine",
            artwork: "Kuratorin",
            portrait: "portrait_15.jpg",
            object: "object_15.jpg",
            audio: "audio_15.ogg",
            message: "“Umweltschutz kennt keine Nationalität.”",
            leporello: "leporello text here"
        },
        {
            id: 16,
            name: "Eva Oltivanyi",
            country: "Schweiz/Ungarn",
            artwork: "Kalocsa-Koffer",
            portrait: "portrait_16.jpg",
            object: "object_16.jpg",
            audio: "audio_16.m4a",
            message: "“Neues in Altem.”",
            leporello: "leporello text here"
        },
        {
            id: 17,
            name: "Maxime Clusqeau",
            country: "Ukraine",
            artwork: "Kettenhemdweste",
            portrait: "portrait_17.png",
            object: "object_17.jpg",
            audio: "audio_17.mp3",
            message: "“Wissen um die Zerstörung bewahren - durch eigenes Handeln.”",
            leporello: "leporello text here"
        }
    ];

    let currentIndex = 0;
    let stopStage = 0; 
    let keysPressed = new Set();

    const body = document.body;
    const audio = document.getElementById('audio-player');
    const portImg = document.getElementById('display-portrait');
    const objImg = document.getElementById('display-object');
    const portLab = document.getElementById('label-portrait');
    const objLab = document.getElementById('label-object');
    const keyMsg = document.getElementById('key-message');
    const leporello = document.getElementById('leporello');
    
    const leftStrip = document.getElementById('strip-left');
    const rightStrip = document.getElementById('strip-right');
    const leftContainer = document.getElementById('container-left');
    const rightContainer = document.getElementById('container-right');

    function setupReels() {
        // Triple the data for seamless looping
        const content = [...data, ...data, ...data];
        content.forEach(item => {
            // Left Reel Item
            const leftBox = document.createElement('div');
            leftBox.className = 'reel-item-container';
            leftBox.innerHTML = `
                <img src="${item.portrait}" class="reel-item">
                <div class="item-label">${item.name}, ${item.country}</div>
            `;
            leftStrip.appendChild(leftBox);

            // Right Reel Item
            const rightBox = document.createElement('div');
            rightBox.className = 'reel-item-container';
            rightBox.innerHTML = `
                <img src="${item.object}" class="reel-item">
                <div class="item-label">${item.artwork}</div>
            `;
            rightStrip.appendChild(rightBox);
        });
    }

    function handleTrigger() {
        if (stopStage === 0) {
            stopLeft();
        } else if (stopStage === 1) {
            stopRight();
        }
    }

    function stopLeft() {
        stopStage = 1;
        const style = window.getComputedStyle(leftStrip);
        const matrix = new WebKitCSSMatrix(style.transform);
        leftStrip.style.transform = `translateY(${matrix.m42}px)`;
        leftContainer.classList.add('stopping');
        
        const targetY = - (currentIndex + data.length) * 100;
        setTimeout(() => {
            leftStrip.style.transform = `translateY(${targetY}vh)`;
        }, 10);
    }

    function stopRight() {
        stopStage = 2;
        const style = window.getComputedStyle(rightStrip);
        const matrix = new WebKitCSSMatrix(style.transform);
        rightStrip.style.transform = `translateY(${matrix.m42}px)`;
        rightContainer.classList.add('stopping');
        
        const targetY = - (currentIndex + data.length) * 100;
        setTimeout(() => {
            rightStrip.style.transform = `translateY(${targetY}vh)`;
        }, 10);

        rightStrip.addEventListener('transitionend', finalizeResult, { once: true });
    }

    function finalizeResult() {
        const match = data[currentIndex];
    
        // Set static result content
        portImg.src = match.portrait;
        objImg.src = match.object;
        portLab.innerText = `${match.name}, ${match.country}`;
        objLab.innerText = match.artwork;
    
        keyMsg.innerText = match.message;
        leporello.innerText = match.leporello;

        body.classList.add('show-result');
        audio.src = match.audio;
        audio.play().catch(e => console.log("Audio playback prevented"));
    
        currentIndex = (currentIndex + 1) % data.length;
    }

    function resetToSpin() {
        stopStage = 0;
        body.classList.remove('show-result');
        leftContainer.classList.remove('stopping');
        rightContainer.classList.remove('stopping');
        leftStrip.style.transform = '';
        rightStrip.style.transform = '';
        audio.pause();
    }

    window.addEventListener('keydown', (e) => {
        keysPressed.add(e.key.toLowerCase());
        if (keysPressed.has('s') && keysPressed.has('k')) {
            if (stopStage !== 0) resetToSpin();
            return;
        }
        if (/^[a-z0-9]$/i.test(e.key) || e.key === ' ') {
            handleTrigger();
        }
    });

    window.addEventListener('keyup', (e) => keysPressed.delete(e.key.toLowerCase()));

    window.addEventListener('touchstart', (e) => {
        if (e.target.id !== 'divider') handleTrigger();
    });

    const divider = document.getElementById('divider');
    let isDragging = false;
    divider.addEventListener('mousedown', () => isDragging = true);
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const percent = (e.clientX / window.innerWidth) * 100;
        document.documentElement.style.setProperty('--divider-pos', `${percent}%`);
    });

    audio.onended = resetToSpin;
    setupReels();
</script>
</body>
</html>
