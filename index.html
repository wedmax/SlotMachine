<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martina Slot Machine</title>
    <style>
        :root {
            --divider-pos: 50%;
            --bg-color: #ffffff;
            --text-color: #000000;
            --accent-color: #ff3b30;
            --spin-speed: 12s; 
            
            /* Sizing percentages relative to each half's current width */
            --pattern-pct-left: 0.60 ;  /* % of left half width */
            --pattern-pct-right: 0.35; /* % of right half width */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        #app {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .screen {
            height: 100%;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
        }

        #screen-left { width: var(--divider-pos); border-right: 1px solid #eee; }
        #screen-right { width: calc(100% - var(--divider-pos)); }

        #divider {
            position: absolute;
            left: var(--divider-pos);
            top: 0;
            width: 20px;
            height: 100%;
            transform: translateX(-50%);
            cursor: col-resize;
            z-index: 100;
            display: flex;
            justify-content: center;
        }
        #divider::after {
            content: '';
            width: 2px;
            height: 100%;
            background: rgba(0,0,0,0.1);
        }

        .reel-container {
            width: 100%;
            height: 100%;
            overflow: hidden;
            transition: opacity 0.5s ease;
            position: relative; 
            z-index: 2;         
        }

        .reel-strip {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        .spinning .reel-strip {
            animation: scrollReel var(--spin-speed) linear infinite;
        }

        .stopping .reel-strip {
            animation: none;
            transition: transform 2.5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        @keyframes scrollReel {
            0% { transform: translateY(0); }
            100% { transform: translateY(-33.333%); }
        }

        .reel-item-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .reel-item {
            max-width: 80%;
            max-height: 50%;
            object-fit: contain;
        }

        .item-label {
            margin-top: 30px;
            color: var(--text-color);
            font-size: 2.4rem; /* 2x bigger */
            font-weight: 700;
            text-transform: uppercase;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            pointer-events: none;
            text-align: center;
        }

        .result-display {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        .show-result .result-display {
            opacity: 1;
            visibility: visible;
        }

        .result-image {
            max-width: 80%;
            max-height: 50%;
            object-fit: contain;
        }

        .result-label {
            margin-top: 30px;
            color: var(--text-color);
            font-size: 2.4rem; /* 2x bigger */
            font-weight: 700;
            text-transform: uppercase;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            text-align: center;
        }

        .show-result .reel-container { opacity: 0; }

        #message-overlay {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 50;
        }
        
        .show-result #message-overlay {
            opacity: 1;
        }

        .key-message {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-color);
            margin-bottom: 0.5rem;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .speaker-icon {
            display: inline-block;
            margin-left: 15px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .leporello-text {
            font-size: 1.1rem;
            color: rgba(0,0,0,0.6);
            max-width: 800px;
            margin: 0 auto;
        }

        .corner-patterns {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 1; 
        }

        .corner-patterns::before,
        .corner-patterns::after {
            content: '';
            position: absolute;
            background-image: url('pattern.png');
            background-size: contain;
            background-repeat: no-repeat;
            aspect-ratio: 1 / 1;
        }

        /* Upper left corner: Anchored at center, scale relative to left screen width */
        .corner-patterns::before {
            top: 0;
            left: 0;
            --size: calc(var(--divider-pos) * var(--pattern-pct-left));
            width: var(--size);
            height: var(--size);
            transform: translate(-25%, -25%);
        }

        /* Lower right corner: Anchored at center, scale relative to right screen width */
        .corner-patterns::after {
            bottom: 0;
            right: 0;
            --size: calc((100vw - var(--divider-pos)) * var(--pattern-pct-right));
            width: var(--size);
            height: var(--size);
            transform: translate(50%, 50%);
        }

    </style>
</head>
<body class="spinning">
<div class="corner-patterns"></div>
<div id="app">
    <div id="screen-left" class="screen">
        <div class="reel-container" id="container-left">
            <div class="reel-strip" id="strip-left"></div>
        </div>
        <div class="result-display">
            <img id="display-portrait" class="result-image" alt="">
            <div id="label-portrait" class="result-label"></div>
        </div>
    </div>

    <div id="divider"></div>

    <div id="screen-right" class="screen">
        <div class="reel-container" id="container-right">
            <div class="reel-strip" id="strip-right"></div>
        </div>
        <div class="result-display">
            <img id="display-object" class="result-image" alt="">
            <div id="label-object" class="result-label"></div>
            
            <div id="message-overlay">
                <div id="key-message-container" class="key-message">
                    <span id="key-message"></span><span class="speaker-icon">🔊</span>
                </div>
                <div id="leporello" class="leporello-text"></div>
            </div>
        </div>
    </div>
</div>

<audio id="audio-player"></audio>

<script>
    const data = [
        { id: 1, name: "Halyna Sonina", country: "Ukraine", artwork: "Patchwork", message: "“Alten Dingen schenke ich neues Leben...”", leporello: "" },
        { id: 2, name: "Loris Andreoli", country: "Schweiz", artwork: "Energie-Stuhl", message: "“Elektroschrott zerstoert die Natur in armen Laendern...”", leporello: "" },
        { id: 3, name: "Ljubov Sobolyeva", country: "Ukraine", artwork: "Welt im Glas", message: "“Die Natur erneuert sich - und gibt innere Ruhe...”", leporello: "" },
        { id: 4, name: "Tarek Shohimi", country: "Schweiz / Syrien", artwork: "Mach dir Licht!", message: "“Energie fasziniert. Mit den Haenden arbeiten ist wie meditieren...”", leporello: "" },
        { id: 5, name: "Daria Kuzmina", country: "Ukraine", artwork: "Wesen", message: "“Aus Verletzung waechst Erneuerung...”", leporello: "" },
        { id: 6, name: "Lubna Abou Kheir", country: "Syrien", artwork: "Sauerstoff", message: "“Ein langer Atem fuer die Zukunft...”", leporello: "" },
        { id: 7, name: "Altaf Hussain Azimi", country: "Afghanistan", artwork: "Sauerstoff", message: "“Ein langer Atem fuer die Zukunft...”", leporello: "" },
        { id: 8, name: "Valeriia Seiler", country: "Ukraine", artwork: "Sauerstoff", message: "“Ein langer Atem fuer die Zukunft...”", leporello: "" },
        { id: 9, name: "Ruth Mujinga", country: "DR Kongo", artwork: "Maniok", message: "=" + "“Der Maniok-Baum spendet Leben...”", leporello: "" },
        { id: 10, name: "Liudmyla Odarchuk", country: "Ukraine", artwork: "Unser Planet - unsere Verantwortung", message: "“Es geht um die Zukunft kuenftiger Generationen...”", leporello: "" },
        { id: 11, name: "Tetiana Sydorenko", country: "Ukraine", artwork: "Unser Planet - unsere Verantwortung", message: "“Es geht um die Zukunft kuenftiger Generationen...”", leporello: "" },
        { id: 12, name: "Olga Kostenko", country: "Ukraine", artwork: "Unser Planet - unsere Verantwortung", message: "“Es geht um die Zukunft kuenftiger Generationen...”", leporello: "" },
        { id: 13, name: "Aresu Rabbani", country: "Afghanistan", artwork: "Auf der Flucht", message: "“Re-Cycling gehoert bei uns zum Alltag...”", leporello: "" },
        { id: 14, name: "Anastasiia Biletska", country: "Ukraine", artwork: "WIP Photo", message: "“Im kreativen Prozess staerken wir Umweltverantwortung und Gemeinschaft...”", leporello: "" },
        { id: 15, name: "Yulia Virts", country: "Ukraine", artwork: "Kuratorin", message: "“Umweltschutz kennt keine Nationalitaet...”", leporello: "" },
        { id: 16, name: "Eva Oltivanyi", country: "Schweiz / Ungarn", artwork: "Kalocsa-Koffer", message: "“Neues in Altem...”", leporello: "" },
        { id: 17, name: "Maxime Clusqeau", country: "Ukraine", artwork: "Chainmail Vest", message: "“Wissen um die Zerstoerung bewahren - durch eigenes Handeln...”", leporello: "" }
    ].map(item => {
        const idPad = String(item.id).padStart(2, '0');
        return {
            ...item,
            portrait: item.id === 12 ? "" : `portrait_${idPad}.jpg`,
            object: `object_${idPad}.jpg`,
            audio: `audio_${idPad}.mp3`
        };
    });

    let currentIndex = 0;
    let stopStage = 0; 
    let keysPressed = new Set();

    const body = document.body;
    const audio = document.getElementById('audio-player');
    const portImg = document.getElementById('display-portrait');
    const objImg = document.getElementById('display-object');
    const portLab = document.getElementById('label-portrait');
    const objLab = document.getElementById('label-object');
    const keyMsg = document.getElementById('key-message');
    const leporello = document.getElementById('leporello');
    
    const leftStrip = document.getElementById('strip-left');
    const rightStrip = document.getElementById('strip-right');
    const leftContainer = document.getElementById('container-left');
    const rightContainer = document.getElementById('container-right');

    function setupReels() {
        const content = [...data, ...data, ...data];
        content.forEach(item => {
            const leftBox = document.createElement('div');
            leftBox.className = 'reel-item-container';
            leftBox.innerHTML = `
                ${item.portrait ? `<img src="${item.portrait}" class="reel-item">` : '<div style="font-size:5rem; color:#eee;">?</div>'}
                <div class="item-label">${item.name}, ${item.country}</div>
            `;
            leftStrip.appendChild(leftBox);

            const rightBox = document.createElement('div');
            rightBox.className = 'reel-item-container';
            rightBox.innerHTML = `
                <img src="${item.object}" class="reel-item">
                <div class="item-label">${item.artwork}</div>
            `;
            rightStrip.appendChild(rightBox);
        });
    }

    function handleTrigger() {
        if (stopStage === 0) {
            stopLeft();
        } else if (stopStage === 1) {
            stopRight();
        }
    }

    function stopLeft() {
        stopStage = 1;
        const style = window.getComputedStyle(leftStrip);
        const matrix = new WebKitCSSMatrix(style.transform);
        leftStrip.style.transform = `translateY(${matrix.m42}px)`;
        leftContainer.classList.add('stopping');
        
        const targetY = - (currentIndex + data.length) * 100;
        setTimeout(() => {
            leftStrip.style.transform = `translateY(${targetY}vh)`;
        }, 10);
    }

    function stopRight() {
        stopStage = 2;
        const style = window.getComputedStyle(rightStrip);
        const matrix = new WebKitCSSMatrix(style.transform);
        rightStrip.style.transform = `translateY(${matrix.m42}px)`;
        rightContainer.classList.add('stopping');
        
        const targetY = - (currentIndex + data.length) * 100;
        setTimeout(() => {
            rightStrip.style.transform = `translateY(${targetY}vh)`;
        }, 10);

        rightStrip.addEventListener('transitionend', finalizeResult, { once: true });
    }

    function finalizeResult() {
        const match = data[currentIndex];
        portImg.src = match.portrait || "";
        portImg.style.display = match.portrait ? 'block' : 'none';
        objImg.src = match.object;
        portLab.innerText = `${match.name}, ${match.country}`;
        objLab.innerText = match.artwork;
        keyMsg.innerText = match.message;
        leporello.innerText = match.leporello;

        body.classList.add('show-result');
        audio.src = match.audio;
        audio.play().catch(e => console.warn("Playback prevented"));
        currentIndex = (currentIndex + 1) % data.length;
    }

    function resetToSpin() {
        stopStage = 0;
        body.classList.remove('show-result');
        leftContainer.classList.remove('stopping');
        rightContainer.classList.remove('stopping');
        leftStrip.style.transform = '';
        rightStrip.style.transform = '';
        audio.pause();
    }

    window.addEventListener('keydown', (e) => {
        keysPressed.add(e.key.toLowerCase());
        if (keysPressed.has('s') && keysPressed.has('k')) {
            if (stopStage !== 0) resetToSpin();
            return;
        }
        if (/^[a-z0-9]$/i.test(e.key) || e.key === ' ') {
            handleTrigger();
        }
    });

    window.addEventListener('keyup', (e) => keysPressed.delete(e.key.toLowerCase()));
    window.addEventListener('touchstart', (e) => { if (e.target.id !== 'divider') handleTrigger(); });

    const divider = document.getElementById('divider');
    let isDragging = false;
    divider.addEventListener('mousedown', () => isDragging = true);
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const percent = (e.clientX / window.innerWidth) * 100;
        document.documentElement.style.setProperty('--divider-pos', `${percent}%`);
    });

    audio.onended = resetToSpin;
    setupReels();
</script>
</body>
</html>
