<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martina Slot Machine - Dual Screen Kiosk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;900&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            font-family: 'Inter', sans-serif;
            color: white;
            user-select: none;
        }

        .reel-container {
            position: relative;
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* The Spinning Animation */
        .spinning {
            animation: blurLoop 0.2s linear infinite;
        }

        @keyframes blurLoop {
            0% { transform: translateY(0); filter: blur(10px); opacity: 0.7; }
            100% { transform: translateY(-50%); filter: blur(15px); opacity: 0.5; }
        }

        /* The Snap Transition */
        .snapped-image {
            max-width: 90%;
            max-height: 80%;
            object-fit: contain;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease;
        }

        /* Draggable Divider Styling */
        #divider {
            width: 10px;
            cursor: col-resize;
            background: rgba(255, 255, 255, 0.1);
            transition: background 0.2s;
            z-index: 50;
        }
        #divider:hover, #divider.active {
            background: rgba(255, 255, 255, 0.5);
        }

        /* Overlay for Match State */
        #message-overlay {
            pointer-events: none;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            transition: opacity 0.8s ease;
        }

        .leporello-text {
            font-size: 1.5rem;
            line-height: 1.6;
            max-width: 600px;
            text-align: center;
        }
    </style>
</head>
<body class="flex flex-row">

    
    <!-- LEFT SCREEN (Portraits) -->
    <div id="screen-left" class="h-full relative border-r border-white/10" style="width: 50%;">
        <div id="reel-left" class="reel-container h-full w-full">
            <img id="img-left" src="" class="snapped-image" alt="Portrait" onerror="this.src='https://placehold.co/600x800/222/fff?text=Portrait'">
        </div>
        <div class="absolute bottom-10 left-10 text-xs opacity-30">SCREEN 1 / PORTRAIT</div>
    </div>

    <!-- DRAGGABLE DIVIDER -->
    <div id="divider"></div>

    <!-- RIGHT SCREEN (Objects) -->
    <div id="screen-right" class="h-full relative flex-grow">
        <div id="reel-right" class="reel-container h-full w-full">
            <img id="img-right" src="" class="snapped-image" alt="Object" onerror="this.src='https://placehold.co/600x800/333/fff?text=Object'">
        </div>
        <div class="absolute bottom-10 right-10 text-xs opacity-30 text-right">SCREEN 2 / OBJECT</div>
    </div>

    <!-- MESSAGE OVERLAY (Match State) -->
    <div id="message-overlay" class="fixed inset-0 flex flex-col items-center justify-center opacity-0 z-40">
        <h1 id="key-message" class="text-6xl font-black uppercase tracking-tighter mb-6 text-yellow-400">KEY MESSAGE</h1>
        <p id="leporello-text" class="leporello-text font-light italic">Leporello description goes here...</p>
    </div>

    <!-- DEBUG UI (Visible for calibration) -->
    <div class="fixed top-4 left-4 bg-black/50 p-2 text-[10px] rounded border border-white/20 z-50 pointer-events-none">
        STATUS: <span id="status-label">SPINNING</span><br>
        INDEX: <span id="index-label">15</span><br>
        TRIGGER: Press Letter/Number
    </div>

    <!-- AUDIO ELEMENT -->
    <audio id="audio-player"></audio>

    <script>

        // Data Structure for the 17 pairs (Currently focused on 15, 16, 17)
        const assetPairs = [
            { id: 15, name: "Yulia", message: "“Umweltschutz kennt keine Nationalität.”", leporello: "The story of Yulia and the object from set 15.", audioExt: "ogg" },
            { id: 16, name: "Eva", message: "“Neues in Altem.”", leporello: "The story of Eva and the object from set 16.", audioExt: "m4a" },
            { id: 17, name: "Maxime", message: "“Wissen um die Zerstörung bewahren – durch eigenes Handeln.”", leporello: "The story of Maxime and the object from set 17.", audioExt: "mp3" }
        ];

        let currentIndex = 0;
        let isSpinning = true;
        let isTransitioning = false;

        const leftImg = document.getElementById('img-left');
        const rightImg = document.getElementById('img-right');
        const leftReel = document.getElementById('reel-left');
        const rightReel = document.getElementById('reel-right');
        const audioPlayer = document.getElementById('audio-player');
        const overlay = document.getElementById('message-overlay');
        const statusLabel = document.getElementById('status-label');
        const indexLabel = document.getElementById('index-label');


        function init() {
            startSpinning();
            setupDivider();
            setupInput();
        }

        function startSpinning() {
            isSpinning = true;
            isTransitioning = false;
            statusLabel.innerText = "SPINNING";
            overlay.style.opacity = "0";
            
            // Add spinning animation classes
            leftReel.classList.add('spinning');
            rightReel.classList.add('spinning');
            
            // Hide specific images during spin
            leftImg.style.opacity = "0";
            rightImg.style.opacity = "0";
        }

        function triggerStop() {
            if (!isSpinning || isTransitioning) return;
            
            isSpinning = false;
            isTransitioning = true;
            statusLabel.innerText = "SNAPPING";

            const currentPair = assetPairs[currentIndex];
            indexLabel.innerText = currentPair.id;

            // 1. Update Sources
            leftImg.src = `portrait_${currentPair.id}.jpg`;
            rightImg.src = `object_${currentPair.id}.jpg`;
            //audioPlayer.src = `audio_${currentPair.id}.mp3`;
            // В функции triggerStop
            const ext = currentPair.audioExt || 'mp3';
            audioPlayer.src = `audio_${currentPair.id}.${ext}`;
            audioPlayer.load(); // ПРИНУДИТЕЛЬНАЯ ПЕРЕЗАГРУЗКА ФАЙЛА

            // 2. Stop Animations
            leftReel.classList.remove('spinning');
            rightReel.classList.remove('spinning');

            // 3. Reveal and "Snap" visuals
            leftImg.style.opacity = "1";
            rightImg.style.opacity = "1";
            leftImg.style.transform = "scale(1.1)";
            rightImg.style.transform = "scale(1.1)";

            setTimeout(() => {
                leftImg.style.transform = "scale(1)";
                rightImg.style.transform = "scale(1)";
                showMatchState(currentPair);
            }, 300);

            // Increment for next loop (Linear)
            currentIndex = (currentIndex + 1) % assetPairs.length;
        }

        function showMatchState(pair) {
            statusLabel.innerText = "MATCH STATE";
            document.getElementById('key-message').innerText = pair.message;
            document.getElementById('leporello-text').innerText = pair.leporello;
            overlay.style.opacity = "1";

            // Play Audio
            audioPlayer.play().catch(e => {
                console.warn("Audio autoplay blocked or file missing. Manual interaction required.", e);
            });
        }

        // Reset when audio finishes
        audioPlayer.onended = () => {
            startSpinning();
        };


        function setupDivider() {
            const divider = document.getElementById('divider');
            const leftScreen = document.getElementById('screen-left');
            let isDragging = false;

            divider.addEventListener('mousedown', (e) => {
                isDragging = true;
                divider.classList.add('active');
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                let percentage = (e.clientX / window.innerWidth) * 100;
                // Constraints
                if (percentage > 20 && percentage < 80) {
                    leftScreen.style.width = percentage + '%';
                }
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
                divider.classList.remove('active');
            });
        }


        function setupInput() {
            document.addEventListener('keydown', (e) => {
                // Regex to check for letters or numbers
                const isAlphanumeric = /^[a-z0-9]$/i.test(e.key);
                
                if (isAlphanumeric || e.code === "Space" || e.code === "Enter") {
                    if (isSpinning) {
                        triggerStop();
                    }
                }
            });
            
            // Allow clicking to trigger for testing
            document.body.addEventListener('click', (e) => {
                if (e.target.id === 'divider') return;
                if (isSpinning) triggerStop();
            });
        }

        // Initialize on load
        window.onload = init;

    </script>
</body>
</html>
