<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martina Slot Machine</title>
    <style>
        :root {
            --divider-pos: 50%;
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #ff3b30;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        #app {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* Screens */
        .screen {
            height: 100%;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #screen-left { width: var(--divider-pos); border-right: 1px solid #333; }
        #screen-right { flex-grow: 1; }

        /* The Divider */
        #divider {
            position: absolute;
            left: var(--divider-pos);
            top: 0;
            width: 20px;
            height: 100%;
            transform: translateX(-50%);
            cursor: col-resize;
            z-index: 100;
            display: flex;
            justify-content: center;
        }
        #divider::after {
            content: '';
            width: 2px;
            height: 100%;
            background: rgba(255,255,255,0.2);
        }

        /* Reel Animation */
        .reel-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .reel-strip {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        .spinning .reel-strip {
            animation: scrollReel 0.5s linear infinite;
            filter: blur(15px);
        }

        @keyframes scrollReel {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        .reel-item {
            width: 100%;
            height: 100vh;
            object-fit: contain;
            flex-shrink: 0;
        }

        /* Result View */
        .result-image {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }
        .result-image.loaded {
            opacity: 1;
        }

        /* UI Overlays */
        #message-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            text-align: left;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 50;
        }
        
        /* Requirement 6: Move message to object side */
        #screen-right #message-overlay {
            opacity: 0;
            left: 10%;
            transform: translateY(-50%);
        }

        .show-result #screen-right #message-overlay {
            opacity: 1;
        }

        .key-message {
            font-size: 4rem;
            font-weight: 800;
            color: var(--text-color);
            margin-bottom: 1rem;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .leporello-text {
            font-size: 1.5rem;
            color: rgba(255,255,255,0.8);
            max-width: 600px;
        }

        /* Hide placeholders during spin */
        .spinning .result-image { display: none; }
        .idle .reel-container { display: none; }
    </style>
</head>
<body class="spinning">

<div id="app">
    <!-- Screen 1: Portait -->
    <div id="screen-left" class="screen">
        <div class="reel-container">
            <div class="reel-strip" id="strip-left">
                <!-- JS will populate -->
            </div>
        </div>
        <img id="display-portrait" class="result-image" alt="">
    </div>

    <div id="divider"></div>

    <!-- Screen 2: Object -->
    <div id="screen-right" class="screen">
        <div class="reel-container">
            <div class="reel-strip" id="strip-right">
                <!-- JS will populate -->
            </div>
        </div>
        <img id="display-object" class="result-image" alt="">
        
        <div id="message-overlay">
            <div id="key-message" class="key-message"></div>
            <div id="leporello" class="leporello-text"></div>
        </div>
    </div>
</div>

<audio id="audio-player"></audio>

<script>
    const data = [
        {
            id: 15,
            name: "Yulia",
            portrait: "portrait_15.jpg",
            object: "object_15.jpg",
            audio: "audio_15.ogg",
            message: "Home is where the heart is.",
            leporello: "Yulia's journey across borders brought only this small locket."
        },
        {
            id: 16,
            name: "Eva",
            portrait: "portrait_16.jpg",
            object: "object_16.jpg",
            audio: "audio_16.m4a",
            message: "The weight of memory.",
            leporello: "Eva carries the keys to a house that no longer exists."
        },
        {
            id: 17,
            name: "Maxime",
            portrait: "portrait_17.png",
            object: "object_17.jpg",
            audio: "audio_17.mp3",
            message: "A future redefined.",
            leporello: "Maxime's camera caught the first light of a new city."
        }
    ];

    let currentIndex = 0;
    let isSpinning = true;
    let keysPressed = new Set();

    const body = document.body;
    const audio = document.getElementById('audio-player');
    const portImg = document.getElementById('display-portrait');
    const objImg = document.getElementById('display-object');
    const keyMsg = document.getElementById('key-message');
    const leporello = document.getElementById('leporello');

    // 1. Populate Reels for animation
    function setupReels() {
        const leftStrip = document.getElementById('strip-left');
        const rightStrip = document.getElementById('strip-right');
        
        // Create a long strip of all portraits/objects for the blur scroll effect
        const content = [...data, ...data, ...data]; // Triple it to ensure seamless loop
        content.forEach(item => {
            const p = document.createElement('img');
            p.src = item.portrait;
            p.className = 'reel-item';
            leftStrip.appendChild(p);

            const o = document.createElement('img');
            o.src = item.object;
            o.className = 'reel-item';
            rightStrip.appendChild(o);
        });
    }

    // 2. Interaction Logic
    function handleTrigger() {
        if (!isSpinning) return;
        stopSpinning();
    }

    function stopSpinning() {
        isSpinning = false;
        const match = data[currentIndex];

        // Reset classes and hide images while loading
        body.classList.remove('spinning');
        body.classList.add('idle');
        portImg.classList.remove('loaded');
        objImg.classList.remove('loaded');

        // Set sources
        portImg.src = match.portrait;
        objImg.src = match.object;
        keyMsg.innerText = match.message;
        leporello.innerText = match.leporello;

        // Fix Requirement 3: Wait for images to load before showing
        let loadedCount = 0;
        const checkLoaded = () => {
            loadedCount++;
            if (loadedCount >= 2) {
                portImg.classList.add('loaded');
                objImg.classList.add('loaded');
                body.classList.add('show-result');
                audio.src = match.audio;
                audio.play().catch(e => console.log("Audio play blocked"));
            }
        };
        portImg.onload = checkLoaded;
        objImg.onload = checkLoaded;

        // Prepare next index
        currentIndex = (currentIndex + 1) % data.length;
    }

    function resetToSpin() {
        isSpinning = true;
        body.classList.remove('idle', 'show-result');
        body.classList.add('spinning');
        audio.pause();
    }

    // 3. Event Listeners
    // Requirement 1: Alpha-numeric trigger, no mouse, yes touch
    window.addEventListener('keydown', (e) => {
        keysPressed.add(e.key.toLowerCase());
        
        // Requirement 4: Shortcut 's' + 'k' to skip audio
        if (keysPressed.has('s') && keysPressed.has('k')) {
            if (!isSpinning) resetToSpin();
            return;
        }

        // Only alphanumeric keys trigger the match
        if (/^[a-z0-9]$/i.test(e.key)) {
            handleTrigger();
        }
    });

    window.addEventListener('keyup', (e) => {
        keysPressed.delete(e.key.toLowerCase());
    });

    // Mobile tapping allowed
    window.addEventListener('touchstart', (e) => {
        // Prevent trigger if touching the divider
        if (e.target.id !== 'divider') {
            handleTrigger();
        }
    });

    // Requirement 5: Divider Logic (Mouse only)
    const divider = document.getElementById('divider');
    let isDragging = false;

    divider.addEventListener('mousedown', () => isDragging = true);
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const percent = (e.clientX / window.innerWidth) * 100;
        document.documentElement.style.setProperty('--divider-pos', `${percent}%`);
    });

    audio.onended = resetToSpin;

    // Start
    setupReels();
</script>

</body>
</html>
