<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martina Slot Machine</title>
    <style>
        :root {
            --divider-pos: 50%;
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #ff3b30;
            /* Slower spin speed */
            --spin-speed: 3s; 
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        #app {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .screen {
            height: 100%;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #screen-left { width: var(--divider-pos); border-right: 1px solid #333; }
        #screen-right { flex-grow: 1; }

        #divider {
            position: absolute;
            left: var(--divider-pos);
            top: 0;
            width: 20px;
            height: 100%;
            transform: translateX(-50%);
            cursor: col-resize;
            z-index: 100;
            display: flex;
            justify-content: center;
        }
        #divider::after {
            content: '';
            width: 2px;
            height: 100%;
            background: rgba(255,255,255,0.2);
        }

        .reel-container {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .reel-strip {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        /* Continuous Spin */
        .spinning .reel-strip {
            animation: scrollReel var(--spin-speed) linear infinite;
            filter: blur(8px);
        }

        /* Smooth Bezier Stop */
        .stopping .reel-strip {
            animation: none;
            transition: transform 2.5s cubic-bezier(0.15, 0, 0.15, 1);
            filter: blur(0);
        }

        @keyframes scrollReel {
            0% { transform: translateY(0); }
            100% { transform: translateY(-33.333%); } /* Adjust to match triple data length */
        }

        .reel-item {
            width: 100%;
            height: 100vh;
            object-fit: contain;
            flex-shrink: 0;
        }

        .result-image {
            display: none; /* Hidden until final state */
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.5s ease-in;
            position: absolute;
            z-index: 10;
        }
        
        .show-result .result-image {
            display: block;
            opacity: 1;
        }
        
        /* Hide reel once result is shown to clear memory/visuals */
        .show-result .reel-container { visibility: hidden; }

        #message-overlay {
            position: absolute;
            top: 50%;
            left: 10%;
            transform: translateY(-50%);
            width: 80%;
            text-align: left;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 50;
        }
        
        .show-result #message-overlay {
            opacity: 1;
        }

        .key-message {
            font-size: 4rem;
            font-weight: 800;
            color: var(--text-color);
            margin-bottom: 1rem;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .leporello-text {
            font-size: 1.5rem;
            color: rgba(255,255,255,0.8);
            max-width: 600px;
        }
    </style>
</head>
<body class="spinning">

<div id="app">
    <div id="screen-left" class="screen">
        <div class="reel-container" id="container-left">
            <div class="reel-strip" id="strip-left"></div>
        </div>
        <img id="display-portrait" class="result-image" alt="">
    </div>

    <div id="divider"></div>

    <div id="screen-right" class="screen">
        <div class="reel-container" id="container-right">
            <div class="reel-strip" id="strip-right"></div>
        </div>
        <img id="display-object" class="result-image" alt="">
        
        <div id="message-overlay">
            <div id="key-message" class="key-message"></div>
            <div id="leporello" class="leporello-text"></div>
        </div>
    </div>
</div>

<audio id="audio-player"></audio>

<script>
    const data = [
        {
            id: 15,
            name: "Yulia",
            portrait: "portrait_15.jpg",
            object: "object_15.jpg",
            audio: "audio_15.ogg",
            message: "Home is where the heart is.",
            leporello: "Yulia's journey across borders brought only this small locket."
        },
        {
            id: 16,
            name: "Eva",
            portrait: "portrait_16.jpg",
            object: "object_16.jpg",
            audio: "audio_16.m4a",
            message: "The weight of memory.",
            leporello: "Eva carries the keys to a house that no longer exists."
        },
        {
            id: 17,
            name: "Maxime",
            portrait: "portrait_17.png",
            object: "object_17.jpg",
            audio: "audio_17.mp3",
            message: "A future redefined.",
            leporello: "Maxime's camera caught the first light of a new city."
        }
    ];

    let currentIndex = 0;
    let stopStage = 0; // 0: Spinning, 1: Left Stop, 2: Right Stop
    let keysPressed = new Set();

    const body = document.body;
    const audio = document.getElementById('audio-player');
    const portImg = document.getElementById('display-portrait');
    const objImg = document.getElementById('display-object');
    const keyMsg = document.getElementById('key-message');
    const leporello = document.getElementById('leporello');
    
    const leftStrip = document.getElementById('strip-left');
    const rightStrip = document.getElementById('strip-right');
    const leftContainer = document.getElementById('container-left');
    const rightContainer = document.getElementById('container-right');

    function setupReels() {
        // Triple the content to ensure the loop and smooth stop positions
        const content = [...data, ...data, ...data];
        content.forEach(item => {
            const p = document.createElement('img');
            p.src = item.portrait;
            p.className = 'reel-item';
            leftStrip.appendChild(p);

            const o = document.createElement('img');
            o.src = item.object;
            o.className = 'reel-item';
            rightStrip.appendChild(o);
        });
    }

    function handleTrigger() {
        if (stopStage === 0) {
            stopLeft();
        } else if (stopStage === 1) {
            stopRight();
        }
    }

    function stopLeft() {
        stopStage = 1;
        // Capture current visual position to prevent jump
        const style = window.getComputedStyle(leftStrip);
        const matrix = new WebKitCSSMatrix(style.transform);
        leftStrip.style.transform = `translateY(${matrix.m41}px)`;
        
        leftContainer.classList.add('stopping');
        
        // Target index in the middle set of the triple data
        const targetY = - (currentIndex + data.length) * 100;
        setTimeout(() => {
            leftStrip.style.transform = `translateY(${targetY}vh)`;
        }, 10);
    }

    function stopRight() {
        stopStage = 2;
        const style = window.getComputedStyle(rightStrip);
        const matrix = new WebKitCSSMatrix(style.transform);
        rightStrip.style.transform = `translateY(${matrix.m41}px)`;
        
        rightContainer.classList.add('stopping');
        
        const targetY = - (currentIndex + data.length) * 100;
        setTimeout(() => {
            rightStrip.style.transform = `translateY(${targetY}vh)`;
        }, 10);

        // When the right reel finishes its smooth transition, show the final result
        rightStrip.addEventListener('transitionend', finalizeResult, { once: true });
    }

    function finalizeResult() {
        const match = data[currentIndex];
        
        portImg.src = match.portrait;
        objImg.src = match.object;
        keyMsg.innerText = match.message;
        leporello.innerText = match.leporello;

        body.classList.add('show-result');
        audio.src = match.audio;
        audio.play().catch(e => console.log("Audio blocked"));
        
        currentIndex = (currentIndex + 1) % data.length;
    }

    function resetToSpin() {
        stopStage = 0;
        body.classList.remove('show-result');
        leftContainer.classList.remove('stopping');
        rightContainer.classList.remove('stopping');
        leftStrip.style.transform = '';
        rightStrip.style.transform = '';
        audio.pause();
    }

    window.addEventListener('keydown', (e) => {
        keysPressed.add(e.key.toLowerCase());
        if (keysPressed.has('s') && keysPressed.has('k')) {
            if (stopStage !== 0) resetToSpin();
            return;
        }
        if (/^[a-z0-9]$/i.test(e.key)) {
            handleTrigger();
        }
    });

    window.addEventListener('keyup', (e) => keysPressed.delete(e.key.toLowerCase()));

    window.addEventListener('touchstart', (e) => {
        if (e.target.id !== 'divider') handleTrigger();
    });

    const divider = document.getElementById('divider');
    let isDragging = false;
    divider.addEventListener('mousedown', () => isDragging = true);
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const percent = (e.clientX / window.innerWidth) * 100;
        document.documentElement.style.setProperty('--divider-pos', `${percent}%`);
    });

    audio.onended = resetToSpin;
    setupReels();
</script>
</body>
</html>
